<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多边实时汇率计算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .converter-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
        }
        h2 { margin-top: 0; color: #333; text-align: center; margin-bottom: 25px; }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input { flex: 2; width: 100%; }
        select { flex: 1; background: #f8f9fa; cursor: pointer; }
        input:focus, select:focus {
            border-color: #007bff;
        }
        .divider {
            height: 1px;
            background: #eee;
            margin: 25px 0;
        }
        .result-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .currency-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #007bff;
            transition: all 0.2s;
        }
        .currency-row:hover {
            background: #f1f3f5;
            transform: translateX(2px);
        }
        .currency-info {
            display: flex;
            flex-direction: column;
        }
        .currency-code {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }
        .currency-name {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .currency-val {
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
        }
        .update-time {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>💱 多边实时汇率</h2>
    
    <div class="input-group">
        <label>基准金额（在下方输入你要转换的货币）</label>
        <div class="input-row">
            <input type="number" id="baseAmount" value="100" placeholder="请输入金额...">
            <select id="baseCurrency">
                <option value="CNY" selected>CNY 人民币</option>
                <option value="USD">USD 美元</option>
                <option value="EUR">EUR 欧元</option>
                <option value="JPY">JPY 日元</option>
                <option value="GBP">GBP 英镑</option>
                <option value="HKD">HKD 港币</option>
                <option value="AUD">AUD 澳元</option>
                <option value="CAD">CAD 加元</option>
            </select>
        </div>
    </div>

    <div class="divider"></div>

    <label>实时兑换结果：</label>
    <div class="result-list" id="resultList">
        <!-- 动态生成的各种货币结果会放在这里 -->
    </div>

    <div class="update-time" id="updateTime">正在获取最新汇率...</div>
</div>

<script>
    const baseAmountInput = document.getElementById('baseAmount');
    const baseCurrencySelect = document.getElementById('baseCurrency');
    const resultList = document.getElementById('resultList');
    const updateTime = document.getElementById('updateTime');

    // 我们想要同时展现的目标货币清单（排除了当前的基准货币）
    const targetCurrencies = [
        { code: 'CNY', name: '人民币 (¥)' },
        { code: 'USD', name: '美元 ($)' },
        { code: 'JPY', name: '日元 (¥)' },
        { code: 'EUR', name: '欧元 (€)' },
        { code: 'GBP', name: '英镑 (£)' },
        { code: 'HKD', name: '港币 ($)' },
        { code: 'AUD', name: '澳元 ($)' }
    ];

    async function updateRates() {
        const amount = parseFloat(baseAmountInput.value) || 0;
        const base = baseCurrencySelect.value;

        try {
            const res = await fetch(`https://open.er-api.com/v6/latest/${base}`);
            const data = await res.json();
            
            if (data.result === "success") {
                resultList.innerHTML = ''; // 清空上一轮的数据
                
                targetCurrencies.forEach(item => {
                    // 如果跟当前的基准货币相同，就不在下方重复显示
                    if (item.code === base) return;

                    const rate = data.rates[item.code];
                    const converted = (amount * rate).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                    // 动态插入一行货币数据
                    const row = document.createElement('div');
                    row.className = 'currency-row';
                    row.innerHTML = `
                        <div class="currency-info">
                            <span class="currency-code">${item.code}</span>
                            <span class="currency-name">${item.name}</span>
                        </div>
                        <div class="currency-val">${converted}</div>
                    `;
                    resultList.appendChild(row);
                });

                updateTime.innerText = `数据源更新时间：${new Date(data.time_last_update_utc).toLocaleString()}`;
            } else {
                resultList.innerHTML = '<div style="text-align:center;color:red;">获取汇率失败</div>';
            }
        } catch (error) {
            resultList.innerHTML = '<div style="text-align:center;color:red;">网络连接异常</div>';
        }
    }

    // 绑定事件监听
    baseAmountInput.addEventListener('input', updateRates);
    baseCurrencySelect.addEventListener('change', updateRates);

    // 首次加载页面时运行
    updateRates();
</script>

</body>
</html>
