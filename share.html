<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简文件及文本分享</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f5f7f9; color: #333; line-height: 1.6; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background-color: #fff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); width: 100%; max-width: 500px; padding: 25px; margin-bottom: 20px; transition: transform 0.2s; }
        h2 { font-size: 1.4rem; margin-bottom: 15px; color: #1a1a1a; text-align: center; font-weight: 600; }
        textarea { width: 100%; height: 120px; border: 1.5px solid #e1e4e8; border-radius: 8px; padding: 12px; font-size: 0.95rem; resize: vertical; outline: none; transition: border-color 0.2s; margin-bottom: 15px; }
        textarea:focus { border-color: #0070f3; }
        .upload-area { border: 2px dashed #cbd5e0; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; background-color: #fafbfd; transition: background-color 0.2s, border-color 0.2s; margin-bottom: 15px; }
        .upload-area:hover { background-color: #f0f4f8; border-color: #0070f3; }
        .upload-area p { font-size: 0.9rem; color: #718096; margin-top: 5px; }
        #file-info { font-size: 0.85rem; color: #2d3748; margin-top: 8px; font-weight: 500; display: none; }
        button { width: 100%; background-color: #0070f3; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s, opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #a0aec0; cursor: not-allowed; }
        .result-box { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 10px; }
        .data-show { width: 100%; background-color: #f7fafc; border: 1.5px solid #edf2f7; border-radius: 8px; padding: 15px; min-height: 80px; word-break: break-all; white-space: pre-wrap; font-size: 0.95rem; margin-bottom: 12px; max-height: 250px; overflow-y: auto; }
        .img-preview { max-width: 100%; max-height: 200px; border-radius: 6px; margin-bottom: 12px; display: none; border: 1px solid #e2e8f0; object-fit: contain; }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        .secondary-btn { background-color: #e2e8f0; color: #4a5568; }
        .secondary-btn:hover { background-color: #cbd5e0; }
        .status-bar { font-size: 0.85rem; text-align: center; margin-top: 10px; color: #718096; font-weight: 500; width: 100%; word-break: break-word; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 发送端容器 -->
    <div class="container">
        <h2>📤 发送到云端</h2>
        <textarea id="text-input" placeholder="输入要传输的文字..."></textarea>
        
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <svg style="width:24px;height:24px;fill:#a0aec0" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
            <p>点击选择要传输的文件 / 拖拽到此处</p>
            <p style="font-size: 0.75rem; color: #a0aec0;">支持图片、PDF 等任何文件</p>
            <div id="file-info"></div>
        </div>
        <input type="file" id="file-input" style="display: none;">

        <button id="send-btn" onclick="sendData()">
            <span>发送到云端</span>
        </button>
    </div>

    <!-- 接收端容器 -->
    <div class="container">
        <h2>📥 接收云端数据</h2>
        <div class="result-box">
            <!-- 文本展示区 -->
            <div id="text-show" class="data-show">正在从云端获取最新数据...</div>
            
            <!-- 图片预览区 -->
            <img id="img-preview" class="img-preview" alt="图片预览">
            
            <!-- 文件下载区 -->
            <div id="file-download-box" class="data-show" style="display: none; align-items: center; justify-content: space-between; min-height: auto;">
                <span id="file-name-label" style="font-weight: 500; font-size: 0.9rem;">文件名.ext</span>
                <a id="download-btn" href="#" download style="text-decoration: none; color: #0070f3; font-weight: bold; font-size: 0.9rem; padding: 4px 8px; border-radius: 4px; background: #e0f0ff;">下载文件</a>
            </div>

            <div class="btn-group">
                <button id="copy-btn" class="secondary-btn" onclick="copyText()">复制文本</button>
                <button class="secondary-btn" onclick="fetchData()">手动刷新</button>
            </div>
            
            <!-- 带有精准报错的智能状态栏 -->
            <div id="status-text" class="status-bar">正在初始化...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ 安全配置信息
        // ==========================================
        const CONFIG = {
            // 你刚才生成的完全纯净无暇的 Base64 密文
            encryptedToken: "mtxxsskhAXOs1u4xqZY6nO5nPGr34c0xbGpK",
            owner: "alanxy817",     // 确保这是你的用户名
            repo: "Playground-notebook",   // 确保这是你的仓库名
            filepath: "transfer_data.json"   // 存储数据的文件
        };

        // 解密还原 Token (不再夹带任何双引号和多余符号)
        CONFIG.token = "ghp_" + atob(CONFIG.encryptedToken);

        let fileSha = null;
        let selectedFileBase64 = null;
        let selectedFileName = "";
        let selectedFileMime = "";

        // 获取元素
        const textInput = document.getElementById('text-input');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const sendBtn = document.getElementById('send-btn');
        const textShow = document.getElementById('text-show');
        const imgPreview = document.getElementById('img-preview');
        const fileDownloadBox = document.getElementById('file-download-box');
        const fileNameLabel = document.getElementById('file-name-label');
        const downloadBtn = document.getElementById('download-btn');
        const copyBtn = document.getElementById('copy-btn');
        const statusText = document.getElementById('status-text');

        // 文件拖拽与选择处理
        fileInput.addEventListener('change', handleFileSelect);
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            selectedFileName = file.name;
            selectedFileMime = file.type;
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                selectedFileBase64 = evt.target.result;
                fileInfo.innerText = `📂 已选择文件: ${selectedFileName} (${(file.size/1024).toFixed(1)} KB)`;
                fileInfo.style.display = "block";
            };
            reader.readAsDataURL(file);
        }

        // 页面初始化时拉取数据
        fetchData();

        // 从 GitHub 获取最新内容（精准排雷诊断版）
        async function fetchData() {
            statusText.innerText = "正在从云端同步...";
            statusText.style.color = "#718096";
            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.filepath}`;
            try {
                const res = await fetch(url, {
                    headers: { "Authorization": `token ${CONFIG.token}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    const payload = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    
                    // 重置接收状态
                    textShow.style.display = 'none';
                    imgPreview.style.display = 'none';
                    fileDownloadBox.style.display = 'none';
                    copyBtn.style.display = 'none';

                    if (payload.type === 'text') {
                        textShow.innerText = payload.content;
                        textShow.style.display = 'block';
                        copyBtn.style.display = 'block';
                    } else if (payload.type === 'file') {
                        const isImage = payload.mime && payload.mime.startsWith('image/');
                        if (isImage) {
                            imgPreview.src = payload.content;
                            imgPreview.style.display = 'block';
                        }
                        fileNameLabel.innerText = payload.fileName;
                        downloadBtn.href = payload.content;
                        downloadBtn.download = payload.fileName;
                        fileDownloadBox.style.display = 'flex';
                    }
                    statusText.innerText = "最新数据已同步！";
                    statusText.style.color = "#28a745";
                } else {
                    // 💥 如果出现非 200 代码，直接在网页上清晰地报出来
                    if (res.status === 401) {
                        statusText.innerText = "❌ 401 错误：Token 无效或已过期！请重新生成。";
                    } else if (res.status === 403) {
                        statusText.innerText = "❌ 403 错误：Token 存在，但没有勾选 [repo] 权限！";
                    } else if (res.status === 404) {
                        statusText.innerText = "❌ 404 错误：未在云端找到该数据文件，你可以直接发送第一条数据，它会自动创建。";
                    } else {
                        statusText.innerText = `❌ 出错啦，状态码: ${res.status}`;
                    }
                    statusText.style.color = "#dc3545";
                    textShow.innerText = "云端目前为空，或无法读取数据。";
                }
            } catch (e) {
                statusText.innerText = "❌ 网络连接失败，请检查网络或配置。";
                statusText.style.color = "#dc3545";
            }
        }

        // 发送数据到 GitHub 
        async function sendData() {
            const textVal = textInput.value.trim();
            let payload = null;

            if (selectedFileBase64) {
                payload = {
                    type: 'file',
                    fileName: selectedFileName,
                    mime: selectedFileMime,
                    content: selectedFileBase64
                };
            } else if (textVal) {
                payload = {
                    type: 'text',
                    content: textVal
                };
            } else {
                alert("请输入文字或选择一个文件！");
                return;
            }

            // UI 状态置灰
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span><span>正在发送到云端...</span>';
            statusText.innerText = "正在向云端递交数据...";
            statusText.style.color = "#718096";

            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.filepath}`;
            
            // 数据打包为 JSON 后再 Base64 编码
            const jsonStr = JSON.stringify(payload);
            const base64Content = btoa(unescape(encodeURIComponent(jsonStr)));

            const bodyData = {
                message: "update transfer data via web interface",
                content: base64Content
            };
            if (fileSha) {
                bodyData.sha = fileSha;
            }

            try {
                const res = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${CONFIG.token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(bodyData)
                });

                if (res.ok) {
                    textInput.value = "";
                    fileInput.value = "";
                    fileInfo.style.display = "none";
                    selectedFileBase64 = null;
                    
                    statusText.innerText = "🎉 发送成功！正在拉取最新同步...";
                    statusText.style.color = "#28a745";
                    
                    // 重新从云端刷新数据同步状态
                    await fetchData();
                } else {
                    if (res.status === 401) {
                        statusText.innerText = "❌ 发送失败 (401)：密钥（Token）验证失败，请重新检查！";
                    } else if (res.status === 403) {
                        statusText.innerText = "❌ 发送失败 (403)：文件过大（超过 5MB）被拦截，或 Token 无 repo 权限。";
                    } else {
                        statusText.innerText = `❌ 发送出错，错误代码: ${res.status}`;
                    }
                    statusText.style.color = "#dc3545";
                }
            } catch (e) {
                statusText.innerText = "❌ 递交请求失败，请检查网络。";
                statusText.style.color = "#dc3545";
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<span>发送到云端</span>';
            }
        }

        // 复制文本
        function copyText() {
            const tempInput = document.createElement("textarea");
            tempInput.value = textShow.innerText;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            const prevText = statusText.innerText;
            const prevColor = statusText.style.color;
            statusText.innerText = "📋 文本已成功复制到剪贴板！";
            statusText.style.color = "#28a745";
            setTimeout(() => {
                statusText.innerText = prevText;
                statusText.style.color = prevColor;
            }, 2000);
        }
    </script>
</body>
</html>
